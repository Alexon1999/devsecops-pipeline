# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          cat requirements.txt
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          ls -la
      - name: Archive venv
        run: |
          tar czf venv.tar.gz .venv
      - name: Upload venv archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: venv
          path: venv.tar.gz
          if-no-files-found: error

  security-checks-sca-sast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Download venv artifact
        uses: actions/download-artifact@v4
        with:
          name: venv
          path: .
      - name: Extract venv
        run: |
          tar xzf venv.tar.gz
      - uses: snyk/actions/setup@master
      - name: Snyk - SCA scan (dépendances)
        run: |
          source .venv/bin/activate
          snyk test --debug --log-level=trace
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: Snyk - SAST scan (analyse du code source)
        run: |
          source .venv/bin/activate
          snyk code test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      
      # Monitor your project with Snyk:
      # - Creates a snapshot of dependencies and source code
      # - Uploaded to Snyk dashboard
      # - Alerts on new vulnerabilities over time
      - name: Snyk - Monitor (track project over time)
        run: |
          source .venv/bin/activate
          snyk monitor --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  test:
    runs-on: ubuntu-latest
    needs: security-checks-sca-sast
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Download venv artifact
        uses: actions/download-artifact@v4
        with:
          name: venv
          path: .
      - name: Extract venv
        run: |
          tar xzf venv.tar.gz
      - name: Lint with flake8
        run: |
          source .venv/bin/activate
          pip install flake8
          flake8 . --count --show-source --statistics
          flake8 . --count --exit-zero --statistics
      - name: Test with pytest
        env:
          DJANGO_SECRET_KEY: dummysecretkeyforci
        run: |
          source .venv/bin/activate
          pip install pytest pytest-django pytest-cov
          pytest tests/ --maxfail=2 --disable-warnings -v --cov=payments --cov-report=xml:coverage.xml --junitxml=pytest-results.xml
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage.xml
            pytest-results.xml

  # Deploy to test environment

  # DAST (Dynamic Application Security Testing) with OWASP ZAP on a test environment
  # for DAST, we need a running instance of the api/web application to scan
  security-checks-dast:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: ZAP Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'https://ualexon.com' # Replace with your test environment URL

  observability:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ./artifacts
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'
      - name: Install Python requirements for observability
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-django pytest-cov
      - name: Generate Prometheus metrics file
        env:
          CI_PIPELINE_STATUS: 'success'
          CI_PIPELINE_VERSION: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_JOB: ${{ github.job }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python .github/scripts/observability_metrics.py \
            --junit artifacts/pytest-results.xml \
            --coverage artifacts/coverage.xml \
            --out observability.prom
      - name: Upload observability metrics
        uses: actions/upload-artifact@v4
        with:
          name: observability-metrics
          path: observability.prom
      - name: Push metrics to Pushgateway (optional)
        env:
          PUSHGATEWAY_URL: ${{ secrets.PUSHGATEWAY_URL }}
        if: ${{ env.PUSHGATEWAY_URL != '' }}
        run: |
          curl -sS -X POST --data-binary @observability.prom "$PUSHGATEWAY_URL/metrics/job/devsecops-pipeline/instance/${{ github.run_id }}"
